version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: qonversion-postgres
    environment:
      POSTGRES_USER: qonversion
      POSTGRES_PASSWORD: qonversion_secret
      POSTGRES_DB: qonversion_analytics
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qonversion -d qonversion_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: qonversion-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://qonversion:qonversion_secret@postgres:5432/qonversion_analytics
      PORT: 3000
      NODE_ENV: production
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
    ports:
      - "3000:3000"
    restart: unless-stopped

volumes:
  postgres_data:
